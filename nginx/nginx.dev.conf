worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Docker embedded DNS
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Dev: frontend is the Vite dev server on port 5173
    upstream web_backend {
        zone web_backend 64k;
        server web:5173 resolve;
    }

    upstream api_backend {
        zone api_backend 64k;
        server api:8000 resolve;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # --- Vite dev server (SPA + HMR WebSocket) ---
        # Must proxy WebSocket upgrades so Vite HMR works through port 80.
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            # WebSocket upgrade headers — required for Vite HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Disable buffering so HMR updates are streamed immediately
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # --- API ---
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        # --- WebSocket (app-level) ---
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # --- OpenAPI docs ---
        location /docs {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }
    }
}
